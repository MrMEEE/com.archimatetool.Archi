app-id: com.archimatetool.Archi
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: Archi

build-options:
  no-debuginfo: true
  strip: false

finish-args:
  # X11 + XShm access
  - --socket=x11
  - --share=ipc
  # Wayland access
  - --socket=wayland
  # OpenGL access
  - --device=dri
  # Network access for collaboration features
  - --share=network
  # Access to home directory for project files
  - --filesystem=home
  # Allow access to common project locations
  - --filesystem=xdg-documents
  # D-Bus access
  - --socket=session-bus

modules:
  - name: archi
    buildsystem: simple
    build-commands:
      # Install to /app
      - install -d /app/archi
      - cp -r * /app/archi/
      
      # Make executable
      - chmod +x /app/archi/Archi
      
      # Create wrapper script
      - install -d /app/bin
      - |
        cat > /app/bin/Archi << 'EOF'
        #!/bin/sh
        exec /app/archi/Archi "$@"
        EOF
      - chmod +x /app/bin/Archi
      
      # Install desktop file
      - install -Dm644 com.archimatetool.Archi.desktop /app/share/applications/com.archimatetool.Archi.desktop
      
      # Install icon
      - install -Dm644 com.archimatetool.Archi.png /app/share/icons/hicolor/256x256/apps/com.archimatetool.Archi.png
      
      # Install AppStream metadata
      - install -Dm644 com.archimatetool.Archi.metainfo.xml /app/share/metainfo/com.archimatetool.Archi.metainfo.xml
    
    sources:
      - type: archive
        url: https://www.archimatetool.com/downloads/archi/5.8.0/Archi-Linux64-5.8.0.tgz
        sha256: 21915865185bcb7a23068997dee52ecc34bcc105437e2f978ccd76473fe2c9e7
        dest: .
      
      - type: file
        path: com.archimatetool.Archi.desktop
      
      - type: file
        path: com.archimatetool.Archi.metainfo.xml
      
      - type: file
        path: com.archimatetool.Archi.png
